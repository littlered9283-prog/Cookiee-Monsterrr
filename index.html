<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Cat Munching</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fff4e6; /* Soft peach background */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        img {
            max-width: 300px;
            border-radius: 15px;
            transition: transform 0.3s ease;
        }
        img:hover {
            transform: scale(1.1); /* Fun interaction on hover */
        }
        h1 {
            color: #ff8c00;
        }
    </style>
</head>
<body>
    <img src="Cookie.jpg">

    <div class="container">
        <h1>Nom Nom Nom!</h1>
        <!-- Replace the src below with your favorite cat image URL -->
        <img src="YOUR_IMAGE_URL_HERE" alt="A cute cartoon cat munching on a cookie">
        <p>This kitty loves cookies!</p>
    </div>

</body>
</html>
